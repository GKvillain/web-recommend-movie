<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lab4</title>
    <style>
      h1 {
        text-align: center;
        border: 5px red dotted;
        background-color: yellow;
      }

      h1::first-letter {
        color: green;
        font-size: 50px;
      }
      a:link {
        background-color: greenyellow;
      }
      a:hover {
        background-color: pink;
      }
      a:active {
        background-color: yellow;
      }
      a:visited {
        background-color: orange;
      }
    </style>
  </head>
  <body>
    <h1>Link go to Google</h1>
    <a href="https://www.google.com/?hl=th" target="_blank">www.Google.com</a>
  </body>
</html>
